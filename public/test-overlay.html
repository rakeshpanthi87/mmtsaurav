<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay Test</title>
<style>
:root{
  --cream:#FFF8E7;--white:#FFFFFF;--ink:#1A1208;--ink2:#3D3020;
  --ink3:#6B5B3E;--ink4:#9C8B72;--gold:#C9963A;--gold2:#E5B84A;
  --border:#E8D9B8;--border2:#D4C49A;--shadow:rgba(26,18,8,.08);--shadow2:rgba(26,18,8,.14);
  --r:12px;--font-display:'Georgia',serif;--font-body:'system-ui',sans-serif;
}
body{background:var(--cream);margin:0;padding:0;font-family:var(--font-body);}
.auth-overlay{
  position:fixed;inset:0;background:var(--cream);z-index:9000;
  display:flex;align-items:center;justify-content:center;padding:24px;
  transition:opacity .4s,visibility .4s;
}
.auth-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.auth-box{
  background:var(--white);border:1px solid var(--border);border-radius:20px;
  padding:40px;width:100%;max-width:440px;
  box-shadow:0 8px 40px var(--shadow);
}
.auth-logo{font-family:var(--font-display);font-size:1.8rem;color:var(--ink);text-align:center;}
.auth-logo span{color:var(--gold);}
.field-group{margin-bottom:16px;}
.field-label{font-size:12px;font-weight:600;color:var(--ink3);margin-bottom:6px;display:block;}
.field-input{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  background:var(--cream);font-family:var(--font-body);font-size:14px;color:var(--ink);outline:none;
  box-sizing:border-box;
  transition:border-color .2s,background .2s;
}
.field-input:focus{border-color:var(--gold);background:var(--white);}
.btn-auth{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:var(--ink);color:var(--cream);font-family:var(--font-body);font-size:15px;font-weight:600;
  cursor:pointer;margin-top:8px;
}
.btn-demo{
  width:100%;padding:10px 16px;border-radius:10px;border:none;
  background:var(--gold);color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;
  margin-top:12px;
}
.hidden{opacity:0;visibility:hidden;pointer-events:none;}
#debug{position:fixed;bottom:0;left:0;right:0;background:#111;color:#0f0;padding:8px;font-family:monospace;font-size:12px;max-height:120px;overflow-y:scroll;}
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <div class="auth-logo">Make<span>My</span>Thread</div>
    <div id="loginForm">
      <div class="field-group">
        <label class="field-label">Email address</label>
        <input class="field-input" id="loginEmail" type="email" value="admin@mmt.com">
      </div>
      <div class="field-group">
        <label class="field-label">Password</label>
        <input class="field-input" id="loginPwd" type="password" value="admin123">
      </div>
      <button class="btn-auth" onclick="doLogin()">Sign In</button>
      <button class="btn-demo" onclick="doDemoLogin()">🚀 Try Demo (no password)</button>
      <div id="formDebug" style="margin-top:12px;font-size:12px;color:var(--ink3);"></div>
    </div>
  </div>
</div>

<div id="debug">Debug output:\n</div>

<script>
function log(msg) {
  console.log(msg);
  document.getElementById('debug').textContent += msg + '\n';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPwd').value;
  log('doLogin called | email=' + email + ' | pwd length=' + pwd.length);
  
  if (!email || !pwd) { alert('Please enter email and password'); return; }
  
  try {
    log('Sending login request...');
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pwd })
    });
    const d = await r.json();
    log('Response status: ' + r.status);
    log('Response body: ' + JSON.stringify(d).slice(0, 200));
    
    if (!r.ok) {
      alert('Login failed: ' + (d.error || 'Unknown error'));
      return;
    }
    
    log('Login SUCCESS! Token: ' + d.token.slice(0, 20) + '...');
    localStorage.setItem('mmt_token', d.token);
    
    // Hide overlay
    document.getElementById('authOverlay').classList.add('hidden');
    log('Overlay hidden. Check if main app is visible.');
    document.body.style.background = '#d4e8c8';
    document.body.innerHTML = '<div style="padding:40px;font-family:system-ui;"><h1 style="color:#2D7A27;">✅ LOGIN SUCCESS!</h1><p>Welcome, ' + d.user.name + ' (' + d.user.role + ')</p><p>Token: ' + d.token.slice(0,30) + '...</p><p>Check DevTools console for details.</p></div>' + document.getElementById('debug').outerHTML;
    
  } catch(e) {
    log('ERROR: ' + e.message);
    alert('Network error: ' + e.message);
  }
}

function doDemoLogin() {
  log('Demo login: skipping API, setting localStorage mock...');
  localStorage.setItem('mmt_token', 'demo-token');
  document.getElementById('authOverlay').classList.add('hidden');
  document.body.style.background = '#d4e8c8';
  document.body.innerHTML = '<div style="padding:40px;font-family:system-ui;"><h1 style="color:#2D7A27;">✅ DEMO MODE!</h1></div>';
}

// Check URL params
const params = new URLSearchParams(window.location.search);
if (params.get('auto') === '1') {
  log('Auto-running doLogin...');
  setTimeout(doLogin, 500);
}
</script>
</body>
</html>
