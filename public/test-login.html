<!DOCTYPE html>
<html><head><title>Login Test</title></head>
<body style="font-family:sans-serif;padding:40px;background:#1A1208;color:#FFF8E7;">
<h2>🧪 MMT Login Test</h2>
<button onclick="testLogin()" style="padding:12px 24px;font-size:16px;background:#C9963A;color:#1A1208;border:none;border-radius:8px;cursor:pointer;">Test Admin Login</button>
<pre id="out" style="margin-top:20px;padding:16px;background:#2B1F0A;border-radius:8px;white-space:pre-wrap;font-size:13px;"></pre>
<script>
async function testLogin() {
  const out = document.getElementById('out');
  out.textContent = 'Testing...';
  try {
    const r = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email:'admin@mmt.com', password:'admin123'})
    });
    const d = await r.json();
    if (r.ok) {
      out.textContent = '✅ LOGIN SUCCESS\n' +
        'Name: ' + (d.user?.name || '?') + '\n' +
        'Email: ' + (d.user?.email || '?') + '\n' +
        'Role: ' + (d.user?.role || '?') + '\n' +
        'Token: ' + (d.token || '').slice(0,30) + '...\n\n' +
        'Full response:\n' + JSON.stringify(d, null, 2);
      // Save token
      localStorage.setItem('mmt_token', d.token);
    } else {
      out.textContent = '❌ LOGIN FAILED\n' + JSON.stringify(d, null, 2);
    }
  } catch(e) {
    out.textContent = '❌ Network error: ' + e.message;
  }
}
</script>
</body></html>
